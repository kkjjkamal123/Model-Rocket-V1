<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#1a1f35"/>
    </linearGradient>
    <radialGradient id="exhaust" cx="50%" cy="0%" r="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ff4500;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes flyAcross {
        0%   { transform: translateX(-150px) translateY(20px); }
        100% { transform: translateX(950px) translateY(-30px); }
      }
      @keyframes flicker1 {
        0%,100% { opacity:1; transform:scaleY(1); }
        50%     { opacity:0.6; transform:scaleY(1.3); }
      }
      @keyframes flicker2 {
        0%,100% { opacity:0.8; transform:scaleY(0.9); }
        50%     { opacity:1; transform:scaleY(1.4); }
      }
      @keyframes starTwinkle {
        0%,100% { opacity: 1; r: 1.5; }
        50%     { opacity: 0.2; r: 0.8; }
      }
      @keyframes starTwinkle2 {
        0%,100% { opacity: 0.6; }
        50%     { opacity: 1; }
      }
      @keyframes pulse {
        0%,100% { opacity: 1; }
        50%     { opacity: 0.4; }
      }
      @keyframes smoke {
        0%   { transform: translateX(0) translateY(0) scale(0.3); opacity: 0.7; }
        100% { transform: translateX(-60px) translateY(10px) scale(2); opacity: 0; }
      }
      .rocket-group {
        animation: flyAcross 4s linear infinite;
      }
      .flame1 {
        animation: flicker1 0.15s ease-in-out infinite;
        transform-origin: 50% 0%;
      }
      .flame2 {
        animation: flicker2 0.12s ease-in-out infinite;
        transform-origin: 50% 0%;
      }
      .smoke1 { animation: smoke 0.8s ease-out infinite; }
      .smoke2 { animation: smoke 0.8s 0.27s ease-out infinite; }
      .smoke3 { animation: smoke 0.8s 0.53s ease-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#sky)" rx="12"/>

  <!-- Stars scattered -->
  <circle cx="50" cy="20" r="1.5" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="120" cy="45" r="1" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle cx="200" cy="15" r="2" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="280" cy="60" r="1.2" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="350" cy="25" r="1.8" fill="white" opacity="0.85"><animate attributeName="opacity" values="0.85;0.3;0.85" dur="3.1s" repeatCount="indefinite"/></circle>
  <circle cx="420" cy="55" r="1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="18" r="1.5" fill="white" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.6s" repeatCount="indefinite"/></circle>
  <circle cx="580" cy="40" r="1.2" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;0.9;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="12" r="2" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.0s" repeatCount="indefinite"/></circle>
  <circle cx="730" cy="50" r="1" fill="white" opacity="0.9"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.4s" repeatCount="indefinite"/></circle>
  <circle cx="810" cy="22" r="1.5" fill="white" opacity="0.65"><animate attributeName="opacity" values="0.65;1;0.65" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="870" cy="55" r="1.2" fill="white" opacity="0.75"><animate attributeName="opacity" values="0.75;0.2;0.75" dur="2.2s" repeatCount="indefinite"/></circle>
  <!-- Row 2 stars -->
  <circle cx="80" cy="80" r="1" fill="white" opacity="0.5"><animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="165" cy="100" r="1.5" fill="white" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="310" cy="90" r="1.2" fill="#aad4ff" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.4s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="85" r="1" fill="white" opacity="0.6"><animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/></circle>
  <circle cx="600" cy="95" r="1.8" fill="#aad4ff" opacity="0.7"><animate attributeName="opacity" values="0.7;0.25;0.7" dur="2.9s" repeatCount="indefinite"/></circle>
  <circle cx="750" cy="88" r="1" fill="white" opacity="0.85"><animate attributeName="opacity" values="0.85;0.3;0.85" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle cx="840" cy="75" r="1.5" fill="white" opacity="0.55"><animate attributeName="opacity" values="0.55;0.9;0.55" dur="3.0s" repeatCount="indefinite"/></circle>

  <!-- "RCANDY" text glow title -->
  <text x="450" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="48" font-weight="bold" fill="#ff6b35" filter="url(#glow)" opacity="0.95" letter-spacing="8">R-CANDY</text>
  <text x="450" y="168" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#aad4ff" opacity="0.8" letter-spacing="4">MODEL ROCKETRY · KNSB SUGAR PROPELLANT</text>

  <!-- Orbiting dot (simulates satellite) -->
  <circle r="3" fill="#ff6b35" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" path="M 80,100 Q 450,30 820,100 Q 450,170 80,100"/>
  </circle>
  <circle r="1.5" fill="white" opacity="0.8">
    <animateMotion dur="6s" begin="3s" repeatCount="indefinite" path="M 80,100 Q 450,30 820,100 Q 450,170 80,100"/>
  </circle>

  <!-- Rocket group flying across -->
  <g class="rocket-group">
    <!-- Smoke trail particles -->
    <g class="smoke1"><ellipse cx="-5" cy="100" rx="8" ry="5" fill="#888" opacity="0.5"/></g>
    <g class="smoke2"><ellipse cx="-5" cy="100" rx="6" ry="4" fill="#aaa" opacity="0.4"/></g>
    <g class="smoke3"><ellipse cx="-5" cy="100" rx="5" ry="3" fill="#ccc" opacity="0.3"/></g>

    <!-- Flame/exhaust -->
    <g class="flame1">
      <ellipse cx="0" cy="108" rx="7" ry="18" fill="#ff6b35" opacity="0.9"/>
    </g>
    <g class="flame2">
      <ellipse cx="0" cy="105" rx="4" ry="12" fill="#ffdd44" opacity="0.95"/>
    </g>

    <!-- Rocket body -->
    <!-- Nozzle -->
    <rect x="-5" y="96" width="10" height="7" fill="#555" rx="1"/>
    <!-- Fins -->
    <polygon points="-14,96 -6,85 -6,96" fill="#cc4400"/>
    <polygon points="14,96 6,85 6,96" fill="#cc4400"/>
    <!-- Body cylinder -->
    <rect x="-6" y="58" width="12" height="40" fill="#eee" rx="3"/>
    <!-- Detail stripe -->
    <rect x="-6" y="72" width="12" height="6" fill="#ff6b35" rx="0"/>
    <!-- Nose cone -->
    <polygon points="0,40 -6,58 6,58" fill="#cc4400"/>
    <!-- Window -->
    <circle cx="0" cy="68" r="3.5" fill="#aad4ff" opacity="0.9"/>
    <circle cx="0" cy="68" r="2" fill="white" opacity="0.6"/>
  </g>

  <!-- Corner accent lines -->
  <line x1="20" y1="185" x2="100" y2="185" stroke="#ff6b35" stroke-width="1" opacity="0.4"/>
  <line x1="800" y1="185" x2="880" y2="185" stroke="#ff6b35" stroke-width="1" opacity="0.4"/>
  <circle cx="20" cy="185" r="2" fill="#ff6b35" opacity="0.6"/>
  <circle cx="880" cy="185" r="2" fill="#ff6b35" opacity="0.6"/>
</svg>

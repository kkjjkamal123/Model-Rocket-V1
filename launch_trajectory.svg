<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" width="800" height="120">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0f1829"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <style>
      @keyframes dashDraw {
        from { stroke-dashoffset: 600; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes markerPop {
        0%   { opacity:0; transform:scale(0); }
        60%  { transform:scale(1.3); }
        100% { opacity:1; transform:scale(1); }
      }
      @keyframes rocketLaunch {
        0%   { transform: translate(60px, 90px) rotate(-70deg); opacity:1; }
        80%  { transform: translate(500px, 15px) rotate(-70deg); opacity:1; }
        90%  { transform: translate(560px, 10px) rotate(-70deg); opacity:0.3; }
        100% { transform: translate(60px, 90px) rotate(-70deg); opacity:0; }
      }
      @keyframes fadeLabel {
        0%,20% { opacity:0; }
        40%,80% { opacity:1; }
        100% { opacity:0; }
      }
      .traj-path {
        stroke-dasharray: 600;
        stroke-dashoffset: 600;
        animation: dashDraw 2s 0.5s ease-out forwards infinite;
      }
      .rkt {
        animation: rocketLaunch 4s ease-out infinite;
      }
      .lbl { animation: fadeLabel 4s 1s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="800" height="120" fill="url(#bg2)" rx="8"/>

  <!-- Ground line -->
  <line x1="40" y1="100" x2="760" y2="100" stroke="#ff6b35" stroke-width="1" opacity="0.3" stroke-dasharray="4,6"/>

  <!-- Phase labels -->
  <text x="75" y="115" text-anchor="middle" font-family="monospace" font-size="9" fill="#ff6b35" opacity="0.7">LAUNCH</text>
  <text x="280" y="35" text-anchor="middle" font-family="monospace" font-size="9" fill="#aad4ff" opacity="0.7" class="lbl">MOTOR BURNOUT ~18 m</text>
  <text x="520" y="15" text-anchor="middle" font-family="monospace" font-size="9" fill="#88ff88" opacity="0.7" class="lbl">APOGEE ~250 m</text>
  <text x="700" y="65" text-anchor="middle" font-family="monospace" font-size="9" fill="#ffaa44" opacity="0.7">RECOVERY</text>

  <!-- Trajectory arc path -->
  <path d="M 75,95 Q 200,50 350,20 Q 480,5 540,12 Q 650,30 720,95"
        fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.5"
        class="traj-path" stroke-dasharray="600"/>

  <!-- Apogee marker -->
  <circle cx="540" cy="12" r="4" fill="#88ff88" opacity="0.8">
    <animate attributeName="r" values="4;7;4" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Phase markers -->
  <circle cx="280" cy="38" r="3" fill="#aad4ff" opacity="0.7"/>
  <circle cx="720" cy="95" r="3" fill="#ffaa44" opacity="0.7"/>

  <!-- Altitude ruler -->
  <line x1="760" y1="10" x2="760" y2="100" stroke="#555" stroke-width="1"/>
  <line x1="757" y1="10" x2="763" y2="10" stroke="#88ff88" stroke-width="1.5"/>
  <line x1="757" y1="100" x2="763" y2="100" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="775" y="14" font-family="monospace" font-size="8" fill="#88ff88">~250 m</text>
  <text x="775" y="104" font-family="monospace" font-size="8" fill="#ff6b35">0 m</text>

  <!-- Animated rocket along trajectory -->
  <g class="rkt">
    <!-- Flame -->
    <ellipse cx="0" cy="8" rx="2.5" ry="6" fill="#ff6b35" opacity="0.9">
      <animate attributeName="ry" values="6;9;6" dur="0.1s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="6" rx="1.5" ry="4" fill="#ffdd44" opacity="0.95">
      <animate attributeName="ry" values="4;6;4" dur="0.12s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Body -->
    <rect x="-3" y="-12" width="6" height="18" fill="#eee" rx="1.5"/>
    <rect x="-3" y="-5" width="6" height="3" fill="#ff6b35"/>
    <!-- Nose -->
    <polygon points="0,-18 -3,-12 3,-12" fill="#cc4400"/>
    <!-- Fins -->
    <polygon points="-7,4 -3,-2 -3,6" fill="#cc4400"/>
    <polygon points="7,4 3,-2 3,6" fill="#cc4400"/>
  </g>

  <!-- Title text -->
  <text x="400" y="112" text-anchor="middle" font-family="monospace" font-size="8" fill="#555" letter-spacing="3">FLIGHT TRAJECTORY — RCANDY-250 — B-CLASS KNSB</text>
</svg>
